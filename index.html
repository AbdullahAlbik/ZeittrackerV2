<script>
(() => {
  const USERS_KEY   = "wt_users_v1";
  const SESSION_KEY = "wt_session_v1";
  const DATA_KEY    = "wt_data_v2";

  const GAS_CONFIG = {
    webAppUrl: "https://script.google.com/macros/s/AKfycbyWO1pgioslpKiT-83WgJZ4LRUdq8npgdP0R6Id0fkRt_9_ofd4mTx9BVXOtBvjPrHeCA/exec",
    apiKey: ""
  };

  const REMOTE_TIMEOUT_MS = 20000;

  const $ = (id) => document.getElementById(id);

  function todayISO() {
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }
  function parseHHMM(s) {
    if (!s || typeof s !== "string") return null;
    const m = s.match(/^(\d{2}):(\d{2})$/);
    if (!m) return null;
    const hh = Number(m[1]), mm = Number(m[2]);
    if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
    return hh * 60 + mm;
  }
  function fmtHHMMFromMin(min) {
    if (min == null || !isFinite(min)) return "–";
    min = Math.round(min);
    min = ((min % (24*60)) + (24*60)) % (24*60);
    const hh = String(Math.floor(min/60)).padStart(2, "0");
    const mm = String(min%60).padStart(2, "0");
    return `${hh}:${mm}`;
  }
  function fmtDur(min) {
    if (min == null || !isFinite(min)) return "–";
    const sign = min < 0 ? "-" : "";
    min = Math.abs(Math.round(min));
    const hh = Math.floor(min / 60);
    const mm = min % 60;
    return `${sign}${hh}:${String(mm).padStart(2, "0")} h`;
  }
  function clampNum(v, def=0) {
    const n = Number(v);
    return Number.isFinite(n) ? n : def;
  }
  function isoWeekStart(dateISO) {
    const d = new Date(dateISO + "T00:00:00");
    const day = d.getDay();
    const diffToMon = (day === 0 ? -6 : 1) - day;
    d.setDate(d.getDate() + diffToMon);
    d.setHours(0,0,0,0);
    return d;
  }
  function addDays(d, days) {
    const x = new Date(d);
    x.setDate(x.getDate() + days);
    return x;
  }
  function dateToISO(d) {
    const x = new Date(d);
    x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
    return x.toISOString().slice(0,10);
  }
  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
  function download(filename, text, mime="text/plain") {
    const blob = new Blob([text], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
  function newId() {
    return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(3);
  }
  function normalizeUsername(u) {
    return (u || "").trim().toLowerCase();
  }
  function validateUsername(u) {
    return /^[a-z0-9._-]{3,24}$/.test(u);
  }
  function normalizeAdjustment(a = {}) {
    return {
      id: a.id || newId(),
      sign: a.sign === "-" ? "-" : "+",
      minutes: Math.max(0, Math.round(clampNum(a.minutes, 0))),
      category: a.category || "Sonstiges",
      note: (a.note || "").trim()
    };
  }
  function normalizeEntry(e = {}) {
    return {
      id: e.id || newId(),
      date: e.date || "",
      start: e.start || "",
      end: e.end || "",
      breakMin: Math.max(0, Math.round(clampNum(e.breakMin, 0))),
      dailyTargetH: clampNum(e.dailyTargetH, 8),
      weeklyTargetH: clampNum(e.weeklyTargetH, 40),
      note: (e.note || "").trim(),
      adjustments: Array.isArray(e.adjustments) ? e.adjustments.map(normalizeAdjustment) : [],
      updatedAt: e.updatedAt || "",
      createdAt: e.createdAt || ""
    };
  }
  function updatedNow(entry) {
    return normalizeEntry({ ...entry, updatedAt: new Date().toISOString() });
  }
  function pickNewerEntry(a, b) {
    const ta = Date.parse(a?.updatedAt || "") || 0;
    const tb = Date.parse(b?.updatedAt || "") || 0;
    return tb >= ta ? normalizeEntry(b) : normalizeEntry(a);
  }
  function mergeEntries(localEntries, remoteEntries) {
    const map = new Map();
    [...(localEntries || []), ...(remoteEntries || [])].forEach(entry => {
      const normalized = normalizeEntry(entry);
      const existing = map.get(normalized.id);
      map.set(normalized.id, existing ? pickNewerEntry(existing, normalized) : normalized);
    });
    return Array.from(map.values()).sort((a,b) => (a.date || "").localeCompare(b.date || ""));
  }

  function b64enc(bytes) {
    let bin = "";
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
  }
  function b64dec(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }
  function randomBytes(len=16) {
    const a = new Uint8Array(len);
    crypto.getRandomValues(a);
    return a;
  }
  async function pbkdf2Hash(password, saltBytes, iterations=150000, bits=256) {
    const enc = new TextEncoder();
    const key = await crypto.subtle.importKey(
      "raw",
      enc.encode(password),
      { name: "PBKDF2" },
      false,
      ["deriveBits"]
    );
    const derived = await crypto.subtle.deriveBits(
      { name: "PBKDF2", salt: saltBytes, iterations, hash: "SHA-256" },
      key,
      bits
    );
    return new Uint8Array(derived);
  }
  function timingSafeEqual(a, b) {
    if (a.length !== b.length) return false;
    let x = 0;
    for (let i=0; i<a.length; i++) x |= (a[i] ^ b[i]);
    return x === 0;
  }

  function loadUsers() {
    try {
      const raw = localStorage.getItem(USERS_KEY);
      const obj = raw ? JSON.parse(raw) : { users: [] };
      if (!obj || !Array.isArray(obj.users)) return { users: [] };
      return obj;
    } catch { return { users: [] }; }
  }
  function saveUsers(obj) {
    localStorage.setItem(USERS_KEY, JSON.stringify(obj));
  }
  function loadSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      const obj = raw ? JSON.parse(raw) : null;
      if (!obj || !obj.userId) return null;
      return obj;
    } catch { return null; }
  }
  function saveSession(userId) {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ userId, ts: Date.now() }));
  }
  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
  }

  async function registerUser(usernameRaw, displayNameRaw, password) {
    const username = normalizeUsername(usernameRaw);
    const displayName = (displayNameRaw || "").trim() || username;

    if (!validateUsername(username)) throw new Error("Benutzername: 3–24 Zeichen, nur a-z, 0-9, . _ -");
    if (!password || password.length < 8) throw new Error("Passwort muss mindestens 8 Zeichen haben.");

    const store = loadUsers();
    if (store.users.some(u => u.username === username)) throw new Error("Benutzername existiert bereits.");

    const salt = randomBytes(16);
    const hash = await pbkdf2Hash(password, salt);

    const isFirst = store.users.length === 0;
    const user = {
      id: newId(),
      username,
      displayName,
      isAdmin: isFirst,
      saltB64: b64enc(salt),
      hashB64: b64enc(hash),
      createdAt: new Date().toISOString()
    };

    store.users.push(user);
    saveUsers(store);

    return user;
  }

  async function verifyLogin(usernameRaw, password) {
    const username = normalizeUsername(usernameRaw);
    const store = loadUsers();
    const user = store.users.find(u => u.username === username);
    if (!user) return null;

    const salt = b64dec(user.saltB64);
    const expected = b64dec(user.hashB64);
    const got = await pbkdf2Hash(password, salt);

    return timingSafeEqual(expected, got) ? user : null;
  }

  async function changePassword(userId, oldPw, newPw) {
    const store = loadUsers();
    const user = store.users.find(u => u.id === userId);
    if (!user) throw new Error("User nicht gefunden.");

    const salt = b64dec(user.saltB64);
    const expected = b64dec(user.hashB64);
    const got = await pbkdf2Hash(oldPw, salt);
    if (!timingSafeEqual(expected, got)) throw new Error("Altes Passwort ist falsch.");

    if (!newPw || newPw.length < 8) throw new Error("Neues Passwort mindestens 8 Zeichen.");

    const newSalt = randomBytes(16);
    const newHash = await pbkdf2Hash(newPw, newSalt);

    user.saltB64 = b64enc(newSalt);
    user.hashB64 = b64enc(newHash);
    saveUsers(store);
  }

  async function adminResetPassword(adminId, targetUserId, newPw) {
    const store = loadUsers();
    const admin = store.users.find(u => u.id === adminId);
    if (!admin || !admin.isAdmin) throw new Error("Keine Admin-Rechte.");
    const user = store.users.find(u => u.id === targetUserId);
    if (!user) throw new Error("User nicht gefunden.");
    if (!newPw || newPw.length < 8) throw new Error("Neues Passwort mindestens 8 Zeichen.");

    const newSalt = randomBytes(16);
    const newHash = await pbkdf2Hash(newPw, newSalt);
    user.saltB64 = b64enc(newSalt);
    user.hashB64 = b64enc(newHash);
    saveUsers(store);
  }

  function adminDeleteUser(adminId, targetUserId) {
    const store = loadUsers();
    const admin = store.users.find(u => u.id === adminId);
    if (!admin || !admin.isAdmin) throw new Error("Keine Admin-Rechte.");
    if (adminId === targetUserId) throw new Error("Admin kann sich hier nicht selbst löschen.");

    store.users = store.users.filter(u => u.id !== targetUserId);
    saveUsers(store);

    const data = loadAppData();
    delete data.entriesByUserId[targetUserId];
    saveAppData(data);
  }

  function loadAppData() {
    try{
      const raw = localStorage.getItem(DATA_KEY);
      const obj = raw ? JSON.parse(raw) : { entriesByUserId: {} };
      if (!obj || typeof obj.entriesByUserId !== "object") return { entriesByUserId: {} };
      return obj;
    }catch{
      return { entriesByUserId: {} };
    }
  }
  function saveAppData(obj) {
    localStorage.setItem(DATA_KEY, JSON.stringify(obj));
  }

  let currentUser = null;
  let selectedEntryId = null;

  function getEntriesForUser(userId) {
    const data = loadAppData();
    return (data.entriesByUserId[userId] || []).map(normalizeEntry);
  }
  function setEntriesForUser(userId, entries) {
    const data = loadAppData();
    if (!data.entriesByUserId) data.entriesByUserId = {};
    data.entriesByUserId[userId] = (entries || []).map(normalizeEntry);
    saveAppData(data);
  }

  function isRemoteConfigured() {
    return !!(GAS_CONFIG.webAppUrl && !String(GAS_CONFIG.webAppUrl).includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL_HERE"));
  }

  function setSyncState(text) {
    $("syncState").textContent = text;
  }

  async function callAppsScript(action, payload = {}) {
    if (!isRemoteConfigured()) {
      throw new Error("Apps-Script-Web-App-URL ist nicht gesetzt.");
    }

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), REMOTE_TIMEOUT_MS);

    try {
      const response = await fetch(GAS_CONFIG.webAppUrl, {
        method: "POST",
        redirect: "follow",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({ action, apiKey: GAS_CONFIG.apiKey || "", ...payload }),
        signal: controller.signal
      });

      const text = await response.text();
      let json;
      try {
        json = JSON.parse(text);
      } catch {
        throw new Error("Ungültige Antwort vom Apps Script.");
      }

      if (!response.ok || json.ok === false) {
        throw new Error(json.error || `HTTP ${response.status}`);
      }

      return json;
    } catch (err) {
      if (err?.name === "AbortError") {
        throw new Error("Timeout beim Zugriff auf Apps Script.");
      }
      throw err;
    } finally {
      clearTimeout(timer);
    }
  }

  async function loadEntriesFromRemote() {
    if (!currentUser) return [];
    const json = await callAppsScript("listEntries", {
      username: currentUser.username
    });
    return Array.isArray(json.entries) ? json.entries.map(normalizeEntry) : [];
  }

  async function saveEntryToRemote(entry) {
    if (!currentUser) throw new Error("Kein User aktiv.");
    const json = await callAppsScript("upsertEntry", {
      username: currentUser.username,
      displayName: currentUser.displayName || currentUser.username,
      entry: normalizeEntry(entry)
    });
    return normalizeEntry(json.entry || entry);
  }

  async function bulkUpsertEntriesToRemote(entries) {
    if (!currentUser) throw new Error("Kein User aktiv.");
    await callAppsScript("bulkUpsertEntries", {
      username: currentUser.username,
      displayName: currentUser.displayName || currentUser.username,
      entries: (entries || []).map(normalizeEntry)
    });
  }

  async function deleteEntryFromRemote(entryId) {
    if (!currentUser) throw new Error("Kein User aktiv.");
    await callAppsScript("deleteEntry", {
      username: currentUser.username,
      entryId
    });
  }

  async function deleteAllEntriesForUsernameRemote(username) {
    if (!username || !isRemoteConfigured()) return;
    await callAppsScript("deleteAllEntriesForUser", { username });
  }

  async function syncLocalAndRemoteEntries() {
    if (!currentUser || !isRemoteConfigured()) return;
    setSyncState("Sheets-Sync: lade Daten …");
    const localEntries = getEntriesForUser(currentUser.id);
    const remoteEntries = await loadEntriesFromRemote();
    const mergedEntries = mergeEntries(localEntries, remoteEntries);
    setEntriesForUser(currentUser.id, mergedEntries);
    if (mergedEntries.length) {
      await bulkUpsertEntriesToRemote(mergedEntries);
    }
    setSyncState(`Sheets-Sync: aktiv (${currentUser.username})`);
  }

  function adjRowTemplate(adj) {
    const id = adj.id;
    const wrap = document.createElement("div");
    wrap.className = "adj-item";
    wrap.dataset.id = id;

    wrap.innerHTML = `
      <div>
        <label>Art</label>
        <select class="adjSign">
          <option value="+">Gutschrift (+)</option>
          <option value="-">Abzug (-)</option>
        </select>
      </div>
      <div>
        <label>Minuten</label>
        <input class="adjMin" type="number" min="0" step="5" value="0" />
      </div>
      <div>
        <label>Kategorie</label>
        <select class="adjCat">
          <option value="Abwesenheit: Externe Schulung">Abwesenheit: Externe Schulung</option>
          <option value="Abwesenheit: Urlaub">Abwesenheit: Urlaub</option>
          <option value="Abwesenheit: Krankheit">Abwesenheit: Krankheit</option>
          <option value="Arbeitszeit: Korrektur">Arbeitszeit: Korrektur</option>
          <option value="Arbeitszeit: Reisezeit">Arbeitszeit: Reisezeit</option>
          <option value="Sonstiges">Sonstiges</option>
        </select>
      </div>
      <div>
        <label>Notiz</label>
        <input class="adjNote" type="text" placeholder="Optional" />
      </div>
      <div>
        <button type="button" class="btn icon-btn btn--negative adjDel" title="Entfernen">×</button>
      </div>
    `;

    wrap.querySelector(".adjSign").value = adj.sign;
    wrap.querySelector(".adjMin").value = String(adj.minutes ?? 0);
    wrap.querySelector(".adjCat").value = adj.category ?? "Sonstiges";
    wrap.querySelector(".adjNote").value = adj.note ?? "";

    wrap.querySelectorAll("input,select").forEach(el => {
      el.addEventListener("input", () => { computeAndRenderKPIs(); });
      el.addEventListener("change", () => { computeAndRenderKPIs(); });
    });

    wrap.querySelector(".adjDel").addEventListener("click", () => {
      wrap.remove();
      computeAndRenderKPIs();
    });

    return wrap;
  }

  function getAdjustmentsFromUI() {
    const list = $("adjList");
    const rows = Array.from(list.querySelectorAll(".adj-item"));
    return rows.map(r => {
      const sign = r.querySelector(".adjSign").value;
      const minutes = clampNum(r.querySelector(".adjMin").value, 0);
      const category = r.querySelector(".adjCat").value;
      const note = r.querySelector(".adjNote").value.trim();
      return { id: r.dataset.id, sign, minutes, category, note };
    }).filter(a => a.minutes > 0 || a.note || a.category);
  }

  function setAdjustmentsToUI(adjs) {
    $("adjList").innerHTML = "";
    (adjs || []).forEach(a => $("adjList").appendChild(adjRowTemplate(a)));
  }

  function compute(entryLike) {
    const startMin = parseHHMM(entryLike.start);
    const endMinRaw = parseHHMM(entryLike.end);
    const breakMin = Math.max(0, Math.round(clampNum(entryLike.breakMin, 0)));
    const dailyTargetMin = Math.round(clampNum(entryLike.dailyTargetH, 8) * 60);

    const adjs = entryLike.adjustments || [];
    let adjSaldo = 0;
    let absenceCredit = 0;
    let otherAdj = 0;

    for (const a of adjs) {
      const s = (a.sign === "-" ? -1 : 1);
      const m = Math.max(0, Math.round(clampNum(a.minutes, 0)));
      const v = s * m;
      adjSaldo += v;

      const cat = (a.category || "").toLowerCase();
      if (cat.startsWith("abwesenheit")) {
        if (v > 0) absenceCredit += v;
        else otherAdj += v;
      } else {
        otherAdj += v;
      }
    }

    let presence = null;
    let net = null;

    if (startMin != null && endMinRaw != null) {
      let endMin = endMinRaw;
      if (endMin < startMin) endMin += 24 * 60;
      presence = endMin - startMin;
      net = Math.max(0, presence - breakMin);
    }

    const credit = (net == null ? 0 : net) + adjSaldo;
    const diff = credit - dailyTargetMin;

    let predEnd = null;
    if (startMin != null) {
      let needNet = dailyTargetMin - adjSaldo;
      if (needNet < 0) needNet = 0;
      predEnd = startMin + breakMin + needNet;
    }

    return { dailyTargetMin, presence, net, adjSaldo, absenceCredit, otherAdj, credit, diff, predEnd };
  }

  function getForm() {
    return {
      date: $("date").value,
      start: $("start").value,
      end: $("end").value,
      breakMin: $("breakMin").value,
      dailyTargetH: $("dailyTargetH").value,
      weeklyTargetH: $("weeklyTargetH").value,
      note: $("note").value.trim(),
      adjustments: getAdjustmentsFromUI(),
    };
  }

  function setForm(entry) {
    $("date").value = entry.date || todayISO();
    $("start").value = entry.start || "";
    $("end").value = entry.end || "";
    $("breakMin").value = String(entry.breakMin ?? 30);
    $("dailyTargetH").value = String(entry.dailyTargetH ?? 8);
    $("weeklyTargetH").value = String(entry.weeklyTargetH ?? 40);
    $("note").value = entry.note || "";
    setAdjustmentsToUI(entry.adjustments || []);
  }

  function clearForm() {
    selectedEntryId = null;
    $("deleteBtn").disabled = true;
    setForm({
      date: todayISO(),
      start: "",
      end: "",
      breakMin: 30,
      dailyTargetH: 8,
      weeklyTargetH: 40,
      note: "",
      adjustments: []
    });
    computeAndRenderKPIs();
  }

  function computeAndRenderKPIs() {
    const f = getForm();
    const c = compute(f);

    $("kPresence").textContent = fmtDur(c.presence);
    $("kNet").textContent = fmtDur(c.net);
    $("kAdj").textContent = fmtDur(c.adjSaldo);
    $("kAbs").textContent = "Abwesenheit (anrechenbar): " + fmtDur(c.absenceCredit);
    $("kCredit").textContent = fmtDur(c.credit);

    const diffTxt = (c.diff >= 0 ? "Über Soll: " : "Unter Soll: ") + fmtDur(c.diff);
    $("kDiff").textContent = diffTxt;

    $("kPredEnd").textContent = (c.predEnd == null ? "–" : fmtHHMMFromMin(c.predEnd));

    renderWeekSummary();
  }

  function renderEntryDetails(e) {
    const pills = [];
    if (e.note) pills.push(`<span class="pill">Notiz: ${escapeHtml(e.note)}</span>`);
    const adjs = e.adjustments || [];
    for (const a of adjs) {
      const sign = a.sign === "-" ? "−" : "+";
      const m = Math.round(clampNum(a.minutes, 0));
      if (!m && !a.note) continue;
      const cat = a.category || "Sonstiges";
      const note = a.note ? ` (${escapeHtml(a.note)})` : "";
      pills.push(`<span class="pill">${escapeHtml(cat)} ${sign}${m} min${note}</span>`);
    }
    return pills.length ? pills.join(" ") : `<span class="muted">–</span>`;
  }

  function renderTable() {
    if (!currentUser) return;
    const entries = [...getEntriesForUser(currentUser.id)].sort((a,b) => (a.date || "").localeCompare(b.date || ""));
    const tbody = $("tableBody");
    tbody.innerHTML = "";

    for (const e of entries) {
      const c = compute(e);
      const dailyTargetMin = Math.round(clampNum(e.dailyTargetH ?? 8, 8) * 60);
      const d = c.credit - dailyTargetMin;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${e.date || "–"}</td>
        <td>${e.start || "–"}</td>
        <td>${e.end || "–"}</td>
        <td class="right">${(e.breakMin ?? 0)} min</td>
        <td class="right">${fmtDur(c.net)}</td>
        <td class="right">${fmtDur(c.adjSaldo)}</td>
        <td class="right">${fmtDur(c.credit)}</td>
        <td class="right">${fmtDur(d)}</td>
        <td class="wrap">
          ${renderEntryDetails(e)}
          <div style="margin-top:8px;">
            <button type="button" class="btn" data-action="edit" data-id="${e.id}">Bearbeiten</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    }

    tbody.querySelectorAll('button[data-action="edit"]').forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.id;
        const entries = getEntriesForUser(currentUser.id);
        const entry = entries.find(x => x.id === id);
        if (!entry) return;
        selectedEntryId = id;
        $("deleteBtn").disabled = false;
        setForm(entry);
        computeAndRenderKPIs();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  }

  function renderWeekSummary() {
    if (!currentUser) return;

    const ref = $("weekRef").value || $("date").value || todayISO();
    const ws = isoWeekStart(ref);
    const we = addDays(ws, 7);

    const entries = getEntriesForUser(currentUser.id).filter(e => {
      if (!e.date) return false;
      const d = new Date(e.date + "T00:00:00");
      return d >= ws && d < we;
    });

    let sumNet = 0, sumAbs = 0, sumAdjOther = 0, sumCredit = 0;
    const weeklyTargetMin = Math.round(clampNum($("weeklyTargetH").value, 40) * 60);

    for (const e of entries) {
      const c = compute(e);
      sumNet += (c.net ?? 0);
      sumAbs += (c.absenceCredit ?? 0);
      sumAdjOther += (c.otherAdj ?? 0);
      sumCredit += (c.credit ?? 0);
    }

    const diff = sumCredit - weeklyTargetMin;
    $("kWeekNet").textContent = fmtDur(sumNet);
    $("kWeekAbs").textContent = fmtDur(sumAbs);
    $("kWeekAdj").textContent = fmtDur(sumAdjOther);
    $("kWeekCredit").textContent = fmtDur(sumCredit);
    $("kWeek").textContent = (diff >= 0 ? "Über Soll: " : "Unter Soll: ") + fmtDur(diff);

    const wsISO = dateToISO(ws);
    const weISO = dateToISO(addDays(ws, 6));
    $("kWeekS").textContent = `Woche ${wsISO} bis ${weISO} | Soll: ${fmtDur(weeklyTargetMin)}`;
  }

  async function upsertEntry() {
    if (!currentUser) return;

    const f = getForm();
    if (!f.date) { alert("Bitte Datum setzen."); return; }

    let entry = updatedNow({
      id: selectedEntryId || newId(),
      date: f.date,
      start: f.start || "",
      end: f.end || "",
      breakMin: Math.max(0, Math.round(clampNum(f.breakMin, 0))),
      dailyTargetH: clampNum(f.dailyTargetH, 8),
      weeklyTargetH: clampNum(f.weeklyTargetH, 40),
      note: f.note || "",
      adjustments: f.adjustments || []
    });

    if (isRemoteConfigured()) {
      try {
        setSyncState("Sheets-Sync: speichere …");
        entry = await saveEntryToRemote(entry);
        setSyncState(`Sheets-Sync: aktiv (${currentUser.username})`);
      } catch (err) {
        setSyncState("Sheets-Sync: Fehler");
        alert("Speichern in Google Sheets fehlgeschlagen:\n" + (err?.message || String(err)));
        return;
      }
    }

    const entries = getEntriesForUser(currentUser.id);
    const idx = entries.findIndex(e => e.id === entry.id);
    if (idx >= 0) entries[idx] = entry;
    else entries.push(entry);
    setEntriesForUser(currentUser.id, entries);

    selectedEntryId = entry.id;
    $("deleteBtn").disabled = false;

    renderTable();
    computeAndRenderKPIs();
  }

  async function deleteEntry() {
    if (!currentUser || !selectedEntryId) return;
    const ok = confirm("Eintrag wirklich löschen?");
    if (!ok) return;

    if (isRemoteConfigured()) {
      try {
        setSyncState("Sheets-Sync: lösche …");
        await deleteEntryFromRemote(selectedEntryId);
        setSyncState(`Sheets-Sync: aktiv (${currentUser.username})`);
      } catch (err) {
        setSyncState("Sheets-Sync: Fehler");
        alert("Löschen in Google Sheets fehlgeschlagen:\n" + (err?.message || String(err)));
        return;
      }
    }

    const entries = getEntriesForUser(currentUser.id).filter(e => e.id !== selectedEntryId);
    setEntriesForUser(currentUser.id, entries);

    clearForm();
    renderTable();
    computeAndRenderKPIs();
  }

  function exportJSON() {
    if (!currentUser) return;
    const entries = getEntriesForUser(currentUser.id);
    const payload = {
      schema: "wt_export_v1",
      user: { username: currentUser.username, displayName: currentUser.displayName },
      exportedAt: new Date().toISOString(),
      entries
    };
    download(`arbeitszeit_${currentUser.username}_${todayISO()}.json`, JSON.stringify(payload, null, 2), "application/json");
  }

  function importJSON(file) {
    if (!currentUser) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const obj = JSON.parse(String(reader.result || ""));
        const entries = Array.isArray(obj?.entries) ? obj.entries : null;
        if (!entries) throw new Error("Ungültiges Format (erwarte { entries: [...] }).");

        const normalized = entries.map(e => normalizeEntry({
          ...e,
          updatedAt: e.updatedAt || new Date().toISOString()
        }));

        const current = getEntriesForUser(currentUser.id);
        const merged = mergeEntries(current, normalized);
        setEntriesForUser(currentUser.id, merged);

        if (isRemoteConfigured()) {
          setSyncState("Sheets-Sync: importiere …");
          await bulkUpsertEntriesToRemote(merged);
          setSyncState(`Sheets-Sync: aktiv (${currentUser.username})`);
        }

        renderTable();
        computeAndRenderKPIs();
        alert("Import abgeschlossen.");
      } catch (err) {
        setSyncState(isRemoteConfigured() ? "Sheets-Sync: Fehler" : "Sheets-Sync: nicht konfiguriert");
        alert("Import fehlgeschlagen: " + (err?.message || String(err)));
      }
    };
    reader.readAsText(file);
  }

  function exportCSV() {
    if (!currentUser) return;
    const entries = [...getEntriesForUser(currentUser.id)].sort((a,b) => (a.date || "").localeCompare(b.date || ""));
    const header = [
      "Datum","Start","Ende","PauseMin","AnwesenheitMin","NettoMin","AdjSaldoMin","AbwesenheitMin","AnrechenbarMin","Notiz","AdjDetails"
    ];
    const rows = [header.join(";")];

    for (const e of entries) {
      const c = compute(e);
      const adjDetails = (e.adjustments || []).map(a => {
        const sign = a.sign === "-" ? "-" : "+";
        const m = Math.round(clampNum(a.minutes, 0));
        const cat = a.category || "Sonstiges";
        const note = a.note ? `:${a.note}` : "";
        return `${cat}${sign}${m}${note}`;
      }).join(" | ");

      rows.push([
        e.date || "",
        e.start || "",
        e.end || "",
        Math.round(clampNum(e.breakMin, 0)),
        c.presence ?? "",
        c.net ?? "",
        c.adjSaldo ?? "",
        c.absenceCredit ?? "",
        c.credit ?? "",
        (e.note || "").replaceAll(";", ","),
        adjDetails.replaceAll(";", ",")
      ].join(";"));
    }

    download(`arbeitszeit_${currentUser.username}_${todayISO()}.csv`, rows.join("\n"), "text/csv");
  }

  function showAuthOverlay(forceOpen=false) {
    const session = loadSession();
    if (forceOpen || !session) {
      $("authOverlay").classList.add("show");
      $("authOverlay").setAttribute("aria-hidden", "false");
      return;
    }
  }
  function hideAuthOverlay() {
    $("authOverlay").classList.remove("show");
    $("authOverlay").setAttribute("aria-hidden", "true");
  }

  function setTab(tab) {
    const isLogin = tab === "login";
    $("tabLogin").classList.toggle("active", isLogin);
    $("tabRegister").classList.toggle("active", !isLogin);
    $("loginPane").style.display = isLogin ? "" : "none";
    $("registerPane").style.display = !isLogin ? "" : "none";
    $("loginErr").textContent = "";
    $("regErr").textContent = "";
    $("regOk").textContent = "";
  }

  async function doLogin() {
    $("loginErr").textContent = "";
    const u = $("loginUser").value;
    const p = $("loginPw").value;

    try {
      const user = await verifyLogin(u, p);
      if (!user) {
        $("loginErr").textContent = "Login fehlgeschlagen (Benutzer/Passwort).";
        return;
      }
      saveSession(user.id);
      await loadCurrentUserFromSession();
      hideAuthOverlay();
      await afterUserReady();
    } catch (e) {
      $("loginErr").textContent = e?.message || String(e);
    }
  }

  async function doRegister() {
    $("regErr").textContent = "";
    $("regOk").textContent = "";

    const u = $("regUser").value;
    const n = $("regName").value;
    const p = $("regPw").value;

    try {
      const user = await registerUser(u, n, p);
      $("regOk").textContent = "Account angelegt. Du kannst dich jetzt anmelden.";
      setTab("login");
      $("loginUser").value = user.username;
      $("loginPw").value = "";
    } catch (e) {
      $("regErr").textContent = e?.message || String(e);
    }
  }

  async function loadCurrentUserFromSession() {
    const session = loadSession();
    if (!session) { currentUser = null; return; }
    const store = loadUsers();
    const user = store.users.find(u => u.id === session.userId) || null;
    currentUser = user;
  }

  function updateUserButton() {
    if (!currentUser) {
      $("userBtnText").textContent = "Nicht angemeldet";
      return;
    }
    const label = currentUser.displayName ? `${currentUser.displayName}` : currentUser.username;
    $("userBtnText").textContent = currentUser.isAdmin ? `${label} (Admin)` : label;
  }

  function toggleUserMenu() {
    $("userMenu").classList.toggle("show");
  }
  function closeUserMenu() {
    $("userMenu").classList.remove("show");
  }

  function logout() {
    clearSession();
    currentUser = null;
    updateUserButton();
    closeUserMenu();
    setSyncState(isRemoteConfigured() ? "Sheets-Sync: bereit" : "Sheets-Sync: nicht konfiguriert");
    showAuthOverlay(true);
  }

  function showUserMgmt() {
    if (!currentUser) return;
    $("userMgmtOverlay").classList.add("show");
    $("userMgmtOverlay").setAttribute("aria-hidden", "false");
    renderUsersList();
    $("adminCreateUserCard").style.display = currentUser.isAdmin ? "" : "none";
    $("userMgmtHint").textContent =
      currentUser.isAdmin
        ? "Admin: Du kannst lokal Benutzer anlegen, Passwörter zurücksetzen und Benutzer löschen."
        : "Du kannst dein Passwort ändern. Benutzerverwaltung ist nur für Admin verfügbar.";
  }
  function hideUserMgmt() {
    $("userMgmtOverlay").classList.remove("show");
    $("userMgmtOverlay").setAttribute("aria-hidden", "true");
    $("adminCreateErr").textContent = "";
    $("adminCreateOk").textContent = "";
    $("pwErr").textContent = "";
    $("pwOk").textContent = "";
    $("pwOld").value = $("pwNew").value = $("pwNew2").value = "";
  }

  function renderUsersList() {
    const store = loadUsers();
    const list = $("usersList");
    list.innerHTML = "";

    for (const u of store.users) {
      const card = document.createElement("div");
      card.className = "card";
      card.style.borderRadius = "10px";
      card.style.overflow = "hidden";

      const head = document.createElement("div");
      head.className = "card__header";
      head.innerHTML = `
        <div>
          <h2>${escapeHtml(u.displayName || u.username)}</h2>
          <p class="hint">@${escapeHtml(u.username)} ${u.isAdmin ? "• Admin" : ""}</p>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "card__body";
      body.innerHTML = `
        <div class="btns" style="margin-top:0;">
          ${currentUser.isAdmin ? `<button class="btn" data-act="reset" data-id="${u.id}">Passwort reset</button>` : ``}
          ${currentUser.isAdmin && currentUser.id !== u.id ? `<button class="btn btn--negative" data-act="del" data-id="${u.id}">Löschen</button>` : ``}
          ${currentUser.id === u.id ? `<span class="mini">Aktueller User</span>` : ``}
        </div>
        ${currentUser.isAdmin ? `<div class="mini" style="margin-top:8px;">Reset setzt ein neues Passwort (mind. 8 Zeichen). Kein E-Mail-Flow, rein lokal.</div>` : ``}
      `;

      card.appendChild(head);
      card.appendChild(body);
      list.appendChild(card);
    }

    list.querySelectorAll("button[data-act='reset']").forEach(btn => {
      btn.addEventListener("click", async () => {
        const targetId = btn.dataset.id;
        const pw = prompt("Neues Passwort (mind. 8 Zeichen):");
        if (!pw) return;
        try {
          await adminResetPassword(currentUser.id, targetId, pw);
          alert("Passwort wurde gesetzt.");
        } catch (e) {
          alert(e?.message || String(e));
        }
      });
    });

    list.querySelectorAll("button[data-act='del']").forEach(btn => {
      btn.addEventListener("click", async () => {
        const targetId = btn.dataset.id;
        const store = loadUsers();
        const targetUser = store.users.find(u => u.id === targetId);
        const ok = confirm("Benutzer wirklich löschen? (Daten dieses Users werden ebenfalls entfernt)");
        if (!ok) return;
        try {
          if (targetUser && isRemoteConfigured()) {
            setSyncState("Sheets-Sync: entferne User-Daten …");
            await deleteAllEntriesForUsernameRemote(targetUser.username);
            setSyncState(`Sheets-Sync: aktiv (${currentUser.username})`);
          }
          adminDeleteUser(currentUser.id, targetId);
          renderUsersList();
        } catch (e) {
          setSyncState(isRemoteConfigured() ? "Sheets-Sync: Fehler" : "Sheets-Sync: nicht konfiguriert");
          alert(e?.message || String(e));
        }
      });
    });
  }

  async function adminCreateUser() {
    $("adminCreateErr").textContent = "";
    $("adminCreateOk").textContent = "";
    if (!currentUser?.isAdmin) return;

    const u = $("adminNewUser").value;
    const n = $("adminNewName").value;
    const p = $("adminNewPw").value;

    try {
      await registerUser(u, n, p);
      $("adminCreateOk").textContent = "Benutzer angelegt.";
      $("adminNewUser").value = $("adminNewName").value = $("adminNewPw").value = "";
      renderUsersList();
    } catch (e) {
      $("adminCreateErr").textContent = e?.message || String(e);
    }
  }

  async function changeOwnPw() {
    $("pwErr").textContent = "";
    $("pwOk").textContent = "";
    if (!currentUser) return;

    const oldPw = $("pwOld").value;
    const newPw = $("pwNew").value;
    const newPw2 = $("pwNew2").value;

    if (newPw !== newPw2) {
      $("pwErr").textContent = "Neues Passwort stimmt nicht überein.";
      return;
    }

    try {
      await changePassword(currentUser.id, oldPw, newPw);
      $("pwOk").textContent = "Passwort geändert.";
      $("pwOld").value = $("pwNew").value = $("pwNew2").value = "";
    } catch (e) {
      $("pwErr").textContent = e?.message || String(e);
    }
  }

  function wireEvents() {
    ["date","start","end","breakMin","dailyTargetH","weeklyTargetH","note"].forEach(id => {
      $(id).addEventListener("input", computeAndRenderKPIs);
      $(id).addEventListener("change", computeAndRenderKPIs);
    });

    $("weekRef").addEventListener("change", renderWeekSummary);
    $("weekRef").addEventListener("input", renderWeekSummary);

    $("addAdjBtn").addEventListener("click", () => {
      $("adjList").appendChild(adjRowTemplate({
        id: newId(),
        sign: "+",
        minutes: 60,
        category: "Abwesenheit: Externe Schulung",
        note: ""
      }));
      computeAndRenderKPIs();
    });

    $("saveBtn").addEventListener("click", upsertEntry);
    $("newBtn").addEventListener("click", clearForm);
    $("deleteBtn").addEventListener("click", deleteEntry);

    $("exportJsonBtn").addEventListener("click", exportJSON);
    $("exportCsvBtn").addEventListener("click", exportCSV);

    $("importJson").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) importJSON(file);
      e.target.value = "";
    });

    $("tabLogin").addEventListener("click", () => setTab("login"));
    $("tabRegister").addEventListener("click", () => setTab("register"));
    $("loginBtn").addEventListener("click", doLogin);
    $("registerBtn").addEventListener("click", doRegister);
    $("authCloseBtn").addEventListener("click", () => {
      if (currentUser) hideAuthOverlay();
    });

    ["loginUser","loginPw"].forEach(id => $(id).addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") doLogin();
    }));
    ["regUser","regName","regPw"].forEach(id => $(id).addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") doRegister();
    }));

    $("userBtn").addEventListener("click", () => toggleUserMenu());
    document.addEventListener("click", (e) => {
      const within = e.target.closest(".dropdown");
      if (!within) closeUserMenu();
    });

    $("logoutBtn").addEventListener("click", logout);

    $("openUserMgmtBtn").addEventListener("click", () => {
      closeUserMenu();
      showUserMgmt();
    });
    $("changePwBtn").addEventListener("click", () => {
      closeUserMenu();
      showUserMgmt();
      setTimeout(() => $("pwOld").focus(), 0);
    });

    $("userMgmtCloseBtn").addEventListener("click", hideUserMgmt);
    $("adminCreateUserBtn").addEventListener("click", adminCreateUser);
    $("pwChangeBtn").addEventListener("click", changeOwnPw);
  }

  async function afterUserReady() {
    updateUserButton();

    $("date").value = todayISO();
    $("weekRef").value = todayISO();

    clearForm();

    if (isRemoteConfigured()) {
      try {
        await syncLocalAndRemoteEntries();
      } catch (err) {
        setSyncState("Sheets-Sync: Fehler");
        alert("Google-Sheets-Synchronisierung fehlgeschlagen:\n" + (err?.message || String(err)));
      }
    } else {
      setSyncState("Sheets-Sync: nicht konfiguriert");
    }

    renderTable();
    computeAndRenderKPIs();
  }

  async function init() {
    if (!window.isSecureContext) {
      alert("Hinweis: Diese App benötigt HTTPS (Secure Context) für Login (WebCrypto). Auf GitHub Pages funktioniert das. Lokal bitte über einen Server starten (nicht file://).");
    }

    wireEvents();
    await loadCurrentUserFromSession();
    updateUserButton();
    setSyncState(isRemoteConfigured() ? "Sheets-Sync: bereit" : "Sheets-Sync: nicht konfiguriert");

    if (!currentUser) {
      setTab("login");
      showAuthOverlay(true);
      $("date").value = todayISO();
      $("weekRef").value = todayISO();
      clearForm();
      return;
    }

    hideAuthOverlay();
    await afterUserReady();
  }

  init();
})();
</script>
